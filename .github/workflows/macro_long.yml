name: Macro LONG (Coinbase BTCUSD)

on:
  workflow_dispatch:

jobs:
  macro_long:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pandas ccxt

      - name: Fetch Coinbase BTC long
        run: python fetch_coinbase_btc_full.py

      - name: Debug Coinbase file
        run: |
          echo "=== Listing data_coinbase_long ==="
          ls -lah data_coinbase_long || true
          echo "=== First lines BTC.csv ==="
          head -5 data_coinbase_long/BTC.csv || true

      - name: Analyze Macro Regime (LONG)
        run: python analyze_macro_regime_kraken_long.py
