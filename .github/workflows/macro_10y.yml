name: Macro 10Y (Binance BTC)

on:
  workflow_dispatch:

jobs:
  macro_10y:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Fetch BTC 10Y from Binance
        run: python fetch_binance_btc_10y.py

      - name: Analyze Macro Regime (10Y)
        run: python analyze_macro_regime_binance.py
