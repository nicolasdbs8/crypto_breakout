name: Daily Paper Run

on:
  schedule:
    - cron: "15 0 * * *"  # 00:15 UTC (≈ 01:15 Paris hiver / 02:15 été)
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Test Kraken connection
        run: python kraken_test_connection.py
        env:
          KRAKEN_API_KEY: ${{ secrets.KRAKEN_API_KEY }}
          KRAKEN_API_SECRET: ${{ secrets.KRAKEN_API_SECRET }}

      - name: Read Kraken balance
        run: python kraken_account.py
        env:
          KRAKEN_API_KEY: ${{ secrets.KRAKEN_API_KEY }}
          KRAKEN_API_SECRET: ${{ secrets.KRAKEN_API_SECRET }}

      - name: Kraken preflight (NO TRADE)
        run: python kraken_preflight.py
        env:
          KRAKEN_API_KEY: ${{ secrets.KRAKEN_API_KEY }}
          KRAKEN_API_SECRET: ${{ secrets.KRAKEN_API_SECRET }}

      - name: Debug which data.py is used
        run: |
          python -c "import data, inspect; print('data module path:', data.__file__); print('first lines:', ''.join(inspect.getsource(data).splitlines(True)[:40]))"

      - name: Debug data folder headers
        run: |
          ls -lah data || true
          for f in data/*.csv; do
            echo "=== $f ==="
            head -n 2 "$f" || true
          done
    
      - name: Run daily pipeline
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python daily_run.py

      - name: Upload outputs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily_outputs
          path: |
            data/outputs/analysis/daily/**
            data/outputs/orders_today.csv
            data/outputs/live_state.json
            data/outputs/live_journal.csv
