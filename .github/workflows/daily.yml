name: Daily

on:
  workflow_dispatch:
  schedule:
    - cron: "15 6 * * *"  # 06:15 UTC (ajuste si besoin)

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 1) Update OHLCV from Kraken (USDC pairs)
      - name: Update data (Kraken)
        run: python update_data_kraken_recent.py

      # (Optionnel mais utile) Debug data headers
      - name: Debug data folder headers
        run: |
          ls -lah data || true
          for f in data/*.csv; do
            echo "=== $f ==="
            head -n 2 "$f" || true
          done

      # 2) Run your existing daily pipeline (signals + orders_today.csv + paper + telegram)
      - name: Run daily pipeline
        run: python daily_run.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      # 3) Kraken preflight (NO TRADE): checks orders_today.csv + Kraken markets + open orders
      - name: Kraken preflight (NO TRADE)
        run: python kraken_preflight.py
        env:
          KRAKEN_API_KEY: ${{ secrets.KRAKEN_API_KEY }}
          KRAKEN_API_SECRET: ${{ secrets.KRAKEN_API_SECRET }}

      - name: Kraken execute (DRY RUN unless LIVE_TRADING=1)
        run: python kraken_execute.py
        env:
          KRAKEN_API_KEY: ${{ secrets.KRAKEN_API_KEY }}
          KRAKEN_API_SECRET: ${{ secrets.KRAKEN_API_SECRET }}
          LIVE_TRADING: ${{ secrets.LIVE_TRADING }}
          MAX_NOTIONAL_PER_ORDER_USDC: "100"
          MAX_NOTIONAL_PER_DAY_USDC: "200"

      - name: Analyze Macro Regime
        run: python analyze_macro_regime.py
