name: Daily Paper Run

on:
  schedule:
    - cron: "15 0 * * *" # 01:15 Paris (00:15 UTC) - ajuste si tu veux
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Debug repo files
        run: |
          echo "PWD=$(pwd)"
          ls -la
          echo "---- workflows ----"
          ls -la .github/workflows || true
          echo "---- daily_run.py head ----"
          sed -n '1,160p' daily_run.py || true
          echo "---- update_data_kraken_recent.py head ----"
          sed -n '1,160p' update_data_kraken_recent.py || true
          echo "---- list data dir ----"
          ls -la data || true

      - name: Run daily pipeline (CI-safe Kraken)
        run: |
          PYTHONPATH=. python update_data_kraken_recent.py
          PYTHONPATH=. python main.py --strategy s2_ma_trend --out_dir data/outputs/analysis/daily
          # optionnels: ne doivent jamais faire échouer le workflow
          PYTHONPATH=. python make_orders.py || true
          PYTHONPATH=. python paper_sim.py || true

      - name: Upload outputs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily_outputs
          path: |
            data/outputs/analysis/daily/**
            orders_today.csv
            live_state.json
            live_journal.csv
