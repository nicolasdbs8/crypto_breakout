name: Daily Paper Run

on:
  schedule:
    - cron: "30 0 * * *" # 00:30 UTC daily
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily pipeline
        run: |
          python daily_run.py

      - name: Upload outputs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily_outputs
          path: |
            data/outputs/analysis/daily/**
            orders_today.csv
            live_state.json
            live_journal.csv
